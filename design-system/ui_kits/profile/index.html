<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TitiLinks · Profile Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="profile.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--warm-black); color: var(--fg); font-family: var(--font-body); }
  .demo-head {
    position: sticky; top: 0; z-index: 20;
    padding: 14px 20px;
    background: rgba(14,12,9,0.85);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--warm-black-4);
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .demo-head .wordmark { font-family: var(--font-display); font-weight: 700; font-size: 20px; letter-spacing: -0.02em; }
  .demo-head .wordmark em { font-style: italic; color: var(--gold); font-weight: 700; }
  .variant-toggle { display: inline-flex; padding: 4px; border-radius: 9999px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
  .variant-toggle button {
    all: unset;
    padding: 8px 14px; border-radius: 9999px;
    font-family: var(--font-body); font-size: 13px; font-weight: 600;
    color: rgba(255,255,255,0.55); cursor: pointer;
    transition: color 200ms, background 200ms;
  }
  .variant-toggle button.active { background: var(--gold); color: #1a1209; }
  .variant-toggle button:not(.active):hover { color: var(--fg); }
  .meta-line { padding: 22px 20px 0; max-width: 430px; margin: 0 auto; color: var(--fg-muted); font-size: 13px; text-align: center; }
  .meta-line em { color: var(--gold); font-style: italic; }
  .stage { min-height: 100vh; padding-bottom: 120px; }
</style>
</head>
<body>

<div class="demo-head">
  <div class="wordmark">Titi<em>Links</em></div>
  <div class="variant-toggle" id="variant-toggle">
    <button data-variant="velvet" class="active">Velvet</button>
    <button data-variant="obelisk">Obelisk</button>
  </div>
  <div style="width: 80px; text-align: right; color: var(--fg-muted); font-size: 12px; font-family: var(--font-mono);">v2</div>
</div>

<div class="meta-line">
  All 4 sizes · half/full span · custom colors · photo + video previews · social icons.
</div>

<div class="stage" id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="LinkButtonVariants.jsx"></script>
<script type="text/babel" src="ProfileShell.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const IMG = {
  hero:  '../../assets/reference/linkme-cata.jpeg',
  carla: '../../assets/reference/linkme-carla.jpeg',
  dahyn: '../../assets/reference/linkme-dahyn.jpeg',
  fafa1: '../../assets/reference/linkme-fafa1.jpeg',
  fafa2: '../../assets/reference/linkme-fafa2.jpeg',
};

// Social inline icons (medium/small/button)
const Icons = {
  instagram: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/></svg>,
  tiktok:    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 3v3.4a5.6 5.6 0 0 0 5 5v3.1a8.6 8.6 0 0 1-5-1.6V15a6 6 0 1 1-6-6v3.1A3 3 0 1 0 13 15V3z"/></svg>,
  youtube:   <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.6 7.2a2.5 2.5 0 0 0-1.8-1.8C18.2 5 12 5 12 5s-6.2 0-7.8.4A2.5 2.5 0 0 0 2.4 7.2 26 26 0 0 0 2 12a26 26 0 0 0 .4 4.8 2.5 2.5 0 0 0 1.8 1.8C5.8 19 12 19 12 19s6.2 0 7.8-.4a2.5 2.5 0 0 0 1.8-1.8A26 26 0 0 0 22 12a26 26 0 0 0-.4-4.8zM10 15V9l5 3z"/></svg>,
  x:         <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 3h3l-7 8 8.2 10h-6.4l-5-6.3L4.5 21H1.5l7.4-8.5L1 3h6.6l4.5 5.7zm-1.1 16h1.7L7.7 4.9H5.9z"/></svg>,
  telegram:  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm4.7 6.9l-1.6 7.5c-.1.5-.4.6-.9.4l-2.4-1.8-1.2 1.1c-.1.1-.2.2-.5.2l.2-2.5 4.5-4c.2-.2 0-.3-.3-.1L9 12l-2.4-.8c-.5-.2-.5-.5.1-.7l9.3-3.6c.4-.2.8.1.7.7z"/></svg>,
  onlyfans:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="9" cy="12" r="5"/><circle cx="9" cy="12" r="1.2" fill="currentColor"/><path d="M15 7h4M15 11h3"/></svg>,
};

// Sample profile using TitiLinks' full feature matrix
const SAMPLE = {
  name: 'Cata Quintero',
  handle: '@iamcataquintero',
  bio: 'Barcelona ↔ Medellín · collab bookings open through Friday',
  heroImage: IMG.hero,
};

function Stage({ variant }) {
  // Users can pick ANY color for their buttons. Default is gold (#C9A55C).
  const goldTheme = { fill_color: '#C9A55C', text_color: '#1a1209', shape: 'rounded', shadow_enabled: true };

  // Example of two custom-colored button themes to demonstrate non-gold palettes
  const roseTheme = { fill_color: '#E87A90', text_color: '#2a0a12', shape: 'rounded', shadow_enabled: true };
  const neonTheme = { fill_color: '#5BE3C9', text_color: '#06221c', shape: 'rounded', shadow_enabled: true };

  // Glass themes stay neutral white tint but take an accent color for hairline/social icon
  const whiteAccentGold  = { fill_color: '#ffffff', text_color: '#ffffff', shape: 'rounded' };
  const whiteAccentRose  = { fill_color: '#E87A90', text_color: '#ffffff', shape: 'rounded' };
  const whiteAccentNeon  = { fill_color: '#5BE3C9', text_color: '#ffffff', shape: 'rounded' };

  return (
    <div className="profile-shell">
      <div className="profile-canvas">
        <ProfileHeader
          image={SAMPLE.heroImage}
          name={SAMPLE.name}
          handle={SAMPLE.handle}
          bio={SAMPLE.bio}
        />

        <div className="block-stack">

          {/* ---- BIG: single full-bleed photo card (link.me Pro-style) ---- */}
          <div className="block-wrap">
            <LinkButton
              variantStyle={variant}
              size="big" span="full"
              title="Exclusive page!"
              subtitle="Behind the scenes · 90% off for the first 50"
              media={{ kind: 'image', src: IMG.carla }}
              theme={whiteAccentGold}
              blockStyle={{ variant: variant === 'velvet' ? 'glass' : 'filled', background_opacity: 1 }}
            />
          </div>

          {/* ---- BIG split: two half-span photo cards side-by-side ---- */}
          <div className="block-wrap">
            <LinkRow>
              <LinkButton
                variantStyle={variant}
                size="big" span="half"
                title="Telegram"
                media={{ kind: 'image', src: IMG.dahyn }}
                theme={whiteAccentGold}
                blockStyle={{ variant: variant === 'velvet' ? 'glass' : 'filled' }}
              />
              <LinkButton
                variantStyle={variant}
                size="big" span="half"
                title="Twitter"
                media={{ kind: 'image', src: IMG.fafa1 }}
                theme={whiteAccentGold}
                blockStyle={{ variant: variant === 'velvet' ? 'glass' : 'filled' }}
              />
            </LinkRow>
          </div>

          {/* ---- BIG: a VIDEO preview (autoplay muted loop) — Pro feature ---- */}
          <div className="block-wrap">
            <LinkButton
              variantStyle={variant}
              size="big" span="full"
              title="Watch: New YouTube drop"
              subtitle="Click to watch on YouTube"
              // If you have a real video file, use { kind: 'video', src: '...mp4', poster: '...' }
              // Or set a youtubeId and we'll pull YouTube's maxresdefault poster.
              media={{ kind: 'video', youtubeId: 'dQw4w9WgXcQ' }}
              theme={whiteAccentGold}
              blockStyle={{ variant: variant === 'velvet' ? 'glass' : 'filled' }}
            />
          </div>

          <div className="section-label">Shop & Socials</div>

          {/* ---- MEDIUM: gold-filled primary CTA (default theme) ---- */}
          <div className="block-wrap">
            <LinkButton
              variantStyle={variant}
              size="medium"
              title="Shop My Collection"
              subtitle="New arrivals every week"
              thumbnail={IMG.fafa2}
              theme={goldTheme}
              blockStyle={{ variant: 'filled', background_opacity: 1 }}
            />
          </div>

          {/* ---- MEDIUM with SOCIAL ICON (instagram) — any color ---- */}
          <div className="block-wrap">
            <LinkButton
              variantStyle={variant}
              size="medium"
              title="Instagram"
              subtitle="@iamcataquintero · 142k"
              socialIcon={Icons.instagram}
              theme={whiteAccentRose}
              blockStyle={{ variant: variant === 'velvet' ? 'glass' : 'outline' }}
            />
          </div>

          {/* ---- MEDIUM with SOCIAL ICON (tiktok), rose accent ---- */}
          <div className="block-wrap">
            <LinkButton
              variantStyle={variant}
              size="medium"
              title="TikTok"
              subtitle="Daily routines · behind the scenes"
              socialIcon={Icons.tiktok}
              theme={whiteAccentRose}
              blockStyle={{ variant: variant === 'velvet' ? 'glass' : 'outline' }}
            />
          </div>

          {/* ---- MEDIUM with custom NON-gold FILL (rose) ---- */}
          <div className="block-wrap">
            <LinkButton
              variantStyle={variant}
              size="medium"
              title="OnlyFans VIP"
              subtitle="90% off · ends Sunday"
              socialIcon={Icons.onlyfans}
              theme={roseTheme}
              blockStyle={{ variant: 'filled', background_opacity: 1 }}
            />
          </div>

          <div className="section-label">Small links</div>

          {/* ---- SMALL side-by-side (half span) with social icons ---- */}
          <div className="block-wrap">
            <LinkRow>
              <LinkButton
                variantStyle={variant}
                size="small" span="half"
                title="YouTube"
                socialIcon={Icons.youtube}
                theme={whiteAccentGold}
                blockStyle={{ variant: variant === 'velvet' ? 'glass' : 'outline' }}
              />
              <LinkButton
                variantStyle={variant}
                size="small" span="half"
                title="X (Twitter)"
                socialIcon={Icons.x}
                theme={whiteAccentGold}
                blockStyle={{ variant: variant === 'velvet' ? 'glass' : 'outline' }}
              />
            </LinkRow>
          </div>

          {/* ---- SMALL single with custom neon color ---- */}
          <div className="block-wrap">
            <LinkButton
              variantStyle={variant}
              size="small"
              title="Telegram · private channel"
              socialIcon={Icons.telegram}
              theme={whiteAccentNeon}
              blockStyle={{ variant: variant === 'velvet' ? 'glass' : 'outline' }}
            />
          </div>

          <div className="section-label">Buttons</div>

          {/* ---- BUTTON: title-only pill, two side-by-side ---- */}
          <div className="block-wrap">
            <LinkRow>
              <LinkButton
                variantStyle={variant}
                size="button" span="half"
                title="Book a shoot"
                theme={neonTheme}
                blockStyle={{ variant: 'filled' }}
              />
              <LinkButton
                variantStyle={variant}
                size="button" span="half"
                title="Contact"
                theme={whiteAccentGold}
                blockStyle={{ variant: variant === 'velvet' ? 'glass' : 'outline' }}
              />
            </LinkRow>
          </div>

          {/* ---- BUTTON: full-width outline, minimal ---- */}
          <div className="block-wrap">
            <LinkButton
              variantStyle={variant}
              size="button"
              title="Restore defaults"
              theme={{ fill_color: '#ffffff', text_color: 'rgba(255,255,255,0.65)', shape: 'rounded' }}
              blockStyle={{ variant: 'minimal' }}
            />
          </div>

        </div>

        <div style={{ textAlign: 'center', marginTop: 40, color: 'rgba(255,255,255,0.35)', fontSize: 12 }}>
          Powered by <span style={{ fontFamily: 'var(--font-display)', fontStyle: 'italic', color: 'var(--gold)' }}>TitiLinks</span>
        </div>
      </div>
    </div>
  );
}

function App() {
  const initial = localStorage.getItem('tl_variant') || 'velvet';
  const [variant, setVariant] = useState(initial);

  useEffect(() => {
    localStorage.setItem('tl_variant', variant);
    const toggle = document.getElementById('variant-toggle');
    [...toggle.querySelectorAll('button')].forEach(b => {
      b.classList.toggle('active', b.dataset.variant === variant);
      b.onclick = () => setVariant(b.dataset.variant);
    });
  }, [variant]);

  return <Stage variant={variant} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
