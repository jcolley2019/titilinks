<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Brand — Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--warm-black); padding: 24px; min-height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; gap: 18px; justify-content: center; }
  .big { font-family: var(--font-display); font-size: 64px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; color: var(--fg); }
  .big em { font-style: italic; color: var(--gold); font-weight: 700; }
  .mid { font-family: var(--font-display); font-size: 28px; font-weight: 700; letter-spacing: -0.02em; color: var(--fg); }
  .mid em { font-style: italic; color: var(--gold); font-weight: 700; }
  .small { font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--fg); letter-spacing: -0.01em; }
  .small em { font-style: italic; color: var(--gold); }
  .cap { width: 56px; height: 56px; border-radius: 14px; background: var(--warm-black-2); border: 1px solid var(--warm-black-4); display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-display); font-style: italic; color: var(--gold); font-weight: 700; font-size: 30px; box-shadow: var(--inset-hairline); }
  .row { display: flex; align-items: center; gap: 16px; }
</style>
</head>
<body>
  <div class="row"><div class="cap">T</div><div class="big">Titi<em>Links</em></div></div>
  <div class="row"><div class="mid">Titi<em>Links</em></div><div class="small">Titi<em>Links</em></div></div>
</body>
</html>
