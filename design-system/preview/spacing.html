<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--warm-black); padding: 24px; min-height: 100vh; box-sizing: border-box; }
  .row { display: flex; align-items: center; gap: 14px; padding: 8px 0; }
  .bar { height: 14px; background: var(--gold); border-radius: 2px; }
  .name { width: 60px; font-family: var(--font-mono); font-size: 12px; color: var(--fg); }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .use { color: var(--fg-muted); font-family: var(--font-body); font-size: 13px; }
</style>
</head>
<body>
  <div class="row"><div class="name">space-1</div><div class="bar" style="width: 4px;"></div><div class="px">4px</div><div class="use">hairlines</div></div>
  <div class="row"><div class="name">space-2</div><div class="bar" style="width: 8px;"></div><div class="px">8px</div><div class="use">icon &harr; label</div></div>
  <div class="row"><div class="name">space-3</div><div class="bar" style="width: 12px;"></div><div class="px">12px</div><div class="use">block vertical gap</div></div>
  <div class="row"><div class="name">space-4</div><div class="bar" style="width: 16px;"></div><div class="px">16px</div><div class="use">canvas padding, button py</div></div>
  <div class="row"><div class="name">space-5</div><div class="bar" style="width: 20px;"></div><div class="px">20px</div><div class="use">button px</div></div>
  <div class="row"><div class="name">space-6</div><div class="bar" style="width: 24px;"></div><div class="px">24px</div><div class="use">section gap</div></div>
  <div class="row"><div class="name">space-8</div><div class="bar" style="width: 32px;"></div><div class="px">32px</div><div class="use">page padding</div></div>
  <div class="row"><div class="name">space-12</div><div class="bar" style="width: 48px;"></div><div class="px">48px</div><div class="use">hero gutters</div></div>
</body>
</html>
